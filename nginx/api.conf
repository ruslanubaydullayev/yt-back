# Reverse proxy for the FastAPI backend.
# Default nginx client_max_body_size is 1m — too small for video uploads.

upstream ranking_api {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name api.ytshort.site;

    # Match MAX_UPLOAD_MB (default 100) with headroom for multipart overhead.
    client_max_body_size 100m;

    location / {
        proxy_pass http://ranking_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
