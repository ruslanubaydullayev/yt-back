# Reverse proxy for the FastAPI backend.
# Default nginx client_max_body_size is 1m — too small for video uploads.
#
# Install: sudo cp nginx/api.conf /etc/nginx/sites-available/api.ytshort.site
#          sudo ln -sf /etc/nginx/sites-available/api.ytshort.site /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# If certbot already manages SSL, ensure BOTH server blocks (80 and 443) include
# client_max_body_size 100m — HTTPS traffic will otherwise still hit the 1m default.

upstream ranking_api {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name api.ytshort.site;

    # Match MAX_UPLOAD_MB (default 100) with headroom for multipart overhead.
    client_max_body_size 100m;

    location / {
        proxy_pass http://ranking_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
    }
}

server {
    listen 443 ssl;
    server_name api.ytshort.site;

    ssl_certificate /etc/letsencrypt/live/api.ytshort.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ytshort.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100m;

    location / {
        proxy_pass http://ranking_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
    }
}
